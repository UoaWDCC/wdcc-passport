name: Production

on:
  push:
    branches:
      - main

jobs:
  production:
    name: Build and Push DB Schema
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build Check
        run: npm run build

      - name: Run DB Migrations
        run: npm run db:migrate
